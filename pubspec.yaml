name: vocab_app
description: "A new Flutter project."
publish_to: 'none'
version: 2.1.0+2
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  supabase_flutter: 2.12.4
  flutter_dotenv: 6.0.1
  flutter_lucide: 1.11.0
  http: 1.6.0
  app_links: 6.3.0
  shared_preferences: 2.5.3
  url_launcher: 6.3.1
  google_fonts: ^6.3.0
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/logo.png
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false 
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#070709" 
    theme_color: "#070709"
  image_path: "assets/logo.png"
  min_sdk_android: 21